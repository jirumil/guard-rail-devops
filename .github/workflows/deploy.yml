name: Build & Deploy GuardRail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: guardrailcrdev2026v2
  ACR_LOGIN_SERVER: guardrailcrdev2026v2.azurecr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Run test suite
        run: pytest

      - name: Check for non-breaking spaces / mixed indentation
        run: python3 scripts/check_nbsp.py $(git ls-files '*.py')

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      # Immutable tag — the short git SHA. Never :latest. See
      # variables.tf's validation blocks for why this is now enforced,
      # not just a convention.
      - id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push api
        run: |
          docker build -f services/api/Dockerfile \
            --build-arg GIT_SHA=${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/guardrail-api:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/guardrail-api:${{ steps.tag.outputs.tag }}

      - name: Build & push worker
        run: |
          docker build -f services/worker/Dockerfile \
            --build-arg GIT_SHA=${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/guardrail-worker:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/guardrail-worker:${{ steps.tag.outputs.tag }}

      - name: Build & push frontend
        run: |
          docker build -f services/frontend/Dockerfile \
            --build-arg GIT_SHA=${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/guardrail-frontend:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/guardrail-frontend:${{ steps.tag.outputs.tag }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: infra/terraform
        run: |
          terraform apply -auto-approve \
            -var="api_image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="worker_image_tag=${{ needs.build-and-push.outputs.image_tag }}" \
            -var="frontend_image_tag=${{ needs.build-and-push.outputs.image_tag }}"
