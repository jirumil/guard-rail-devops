name: Build & Deploy GuardRail

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_NAME: guardrailcrdev2026v2
  ACR_LOGIN_SERVER: guardrailcrdev2026v2.azurecr.io

jobs:
  # ---------------------------------------------------------------------
  # 1. Lint + test the Python services. Nothing downstream runs if this
  #    fails — a red test suite or a lint violation blocks the build.
  # ---------------------------------------------------------------------
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install black==24.4.2 flake8==7.1.0

      - name: Lint (flake8)
        run: flake8 --max-line-length=100 common/ services/ scripts/

      - name: Format check (black)
        run: black --check common/ services/ scripts/

      - name: Check for non-breaking spaces / mixed indentation
        run: python3 scripts/check_nbsp.py $(git ls-files '*.py')

      - name: Run test suite
        run: pytest

  # ---------------------------------------------------------------------
  # 2. Build + push each service image, tagged with the immutable git
  #    SHA (never :latest — see infra/terraform/variables.tf validation).
  #    Matrix keeps the three near-identical build steps in one place.
  # ---------------------------------------------------------------------
  build-and-push:
    needs: lint-and-test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    strategy:
      matrix:
        service: [api, worker, frontend]
    steps:
      - uses: actions/checkout@v4

      - id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build & push ${{ matrix.service }}
        run: |
          docker build -f services/${{ matrix.service }}/Dockerfile \
            --build-arg GIT_SHA=${{ steps.tag.outputs.tag }} \
            -t ${{ env.ACR_LOGIN_SERVER }}/guardrail-${{ matrix.service }}:${{ steps.tag.outputs.tag }} .
          docker push ${{ env.ACR_LOGIN_SERVER }}/guardrail-${{ matrix.service }}:${{ steps.tag.outputs.tag }}

  # ---------------------------------------------------------------------
  # 3. Terraform plan, then apply that exact plan file — never a
  #    freestanding `apply`, so what gets applied is what was reviewed
  #    in the logs, not a second, potentially-drifted evaluation.
  # ---------------------------------------------------------------------
  terraform:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      TF_VAR_api_image_tag: ${{ needs.build-and-push.outputs.image_tag }}
      TF_VAR_worker_image_tag: ${{ needs.build-and-push.outputs.image_tag }}
      TF_VAR_frontend_image_tag: ${{ needs.build-and-push.outputs.image_tag }}
    defaults:
      run:
        working-directory: infra/terraform
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
